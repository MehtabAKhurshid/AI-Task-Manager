<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Task Manager</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .container {
            width: 100%;
            max-width: 700px;
            background: #ffffff;
            border-radius: 18px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
            padding: 35px;
        }

        .title {
            text-align: center;
            margin-bottom: 10px;
            color: #1e3c72;
            font-size: 2rem;
            font-weight: bold;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 1rem;
        }

        .task-form {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
        }

        .task-form input[type="text"] {
            flex: 1;
            padding: 14px 16px;
            border: 1px solid #ccc;
            border-radius: 10px;
            font-size: 1rem;
            outline: none;
            transition: 0.3s ease;
        }

        .task-form input[type="text"]:focus {
            border-color: #2a5298;
            box-shadow: 0 0 0 3px rgba(42, 82, 152, 0.15);
        }

        .task-form button {
            padding: 14px 22px;
            border: none;
            background: #2a5298;
            color: white;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .task-form button:hover {
            background: #1e3c72;
        }

        .section-title {
            margin-bottom: 15px;
            color: #222;
            font-size: 1.2rem;
            border-left: 5px solid #2a5298;
            padding-left: 10px;
        }

        ul {
            list-style: none;
        }

        li {
            background: #f4f7fb;
            padding: 14px 16px;
            border-radius: 10px;
            margin-bottom: 12px;
            border-left: 5px solid #2a5298;
            color: #333;
            font-size: 1rem;
            transition: 0.2s ease;
        }

        li:hover {
            transform: translateX(4px);
            background: #eef3fa;
        }

        .empty-state {
            text-align: center;
            color: #777;
            background: #f8f9fc;
            padding: 20px;
            border-radius: 10px;
            border: 1px dashed #cfd8e3;
        }

        .footer-note {
            text-align: center;
            margin-top: 25px;
            color: #777;
            font-size: 0.9rem;
        }

        @media (max-width: 640px) {
            .task-form {
                flex-direction: column;
            }

            .task-form button {
                width: 100%;
            }

            .container {
                padding: 25px 20px;
            }

            .title {
                font-size: 1.7rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">AI Task Manager</div>
        <div class="subtitle">Built with GitHub and AI as a coding partner</div>

        <form class="task-form" method="POST">
            <input type="text" name="task" placeholder="Enter a new task..." required>
            <button type="submit">Add Task</button>
        </form>

        <div class="section-title">Tasks List</div>

        {% if tasks %}
            <ul>
                {% for task in tasks %}
                    <li>{{ task }}</li>
                {% endfor %}
            </ul>
        {% else %}
            <div class="empty-state">No tasks yet. Add your first task above.</div>
        {% endif %}

        <div class="footer-note">Demo project created with AI-assisted development</div>
    </div>
</body>
</html>
